<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARDÍN DIGITAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Libre+Baskerville:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --earth-dark: #1a1612;
            --earth-mid: #2d261f;
            --earth-light: #3d352c;
            --leaf-dark: #1e3a1e;
            --leaf-mid: #2d5a2d;
            --leaf-light: #4a8a4a;
            --leaf-gold: #c4a35a;
            --flower-pink: #d4a5a5;
            --flower-purple: #9b7bb8;
            --flower-orange: #d4a574;
            --flower-blue: #7eb8c9;
            --sky-top: #1a2a1a;
            --sky-bottom: #0d1a0d;
            --water: #3a5a6a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
            min-height: 100vh;
            font-family: 'Cormorant Garamond', serif;
            color: #e8e4d9;
            overflow-x: hidden;
        }

        .garden-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(45, 90, 45, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(155, 123, 184, 0.1) 0%, transparent 40%),
                linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
        }

        .ground {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35%;
            background: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 50 Q25 30 50 50 T100 50 L100 100 L0 100 Z' fill='%231a1612'/%3E%3C/svg%3E"),
                linear-gradient(180deg, var(--earth-mid) 0%, var(--earth-dark) 100%);
            background-size: 100% auto;
            background-position: bottom;
            background-repeat: no-repeat;
            z-index: 0;
        }

        .ground::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    transparent 20px,
                    rgba(0,0,0,0.1) 20px,
                    rgba(0,0,0,0.1) 21px
                );
        }

        .fireflies {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .firefly {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--leaf-gold);
            border-radius: 50%;
            animation: firefly var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            box-shadow: 0 0 10px var(--leaf-gold), 0 0 20px var(--leaf-gold);
        }

        @keyframes firefly {
            0%, 100% { 
                opacity: 0; 
                transform: translate(0, 0) scale(0);
            }
            25% { 
                opacity: 1; 
                transform: translate(var(--tx1), var(--ty1)) scale(1);
            }
            50% { 
                opacity: 0.5; 
                transform: translate(var(--tx2), var(--ty2)) scale(0.5);
            }
            75% { 
                opacity: 1; 
                transform: translate(var(--tx3), var(--ty3)) scale(1);
            }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 2rem 0;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 300;
            letter-spacing: 0.2em;
            font-style: italic;
            color: var(--leaf-gold);
            text-shadow: 0 0 30px rgba(196, 163, 90, 0.3);
            margin-bottom: 0.5rem;
        }

        .header p {
            font-size: 1.1rem;
            font-style: italic;
            color: #8a8577;
        }

        .garden-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .garden-stat {
            text-align: center;
        }

        .garden-stat-value {
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--leaf-light);
        }

        .garden-stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #6a6557;
        }

        .garden {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 2rem;
            flex-wrap: wrap;
            padding: 2rem 0;
            min-height: 400px;
        }

        .plant-container {
            position: relative;
            width: 120px;
            height: 180px;
            cursor: pointer;
            transition: transform 0.4s ease;
        }

        .plant-container:hover {
            transform: translateY(-10px);
        }

        .plant {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stem {
            width: 6px;
            background: linear-gradient(90deg, var(--leaf-dark), var(--leaf-mid), var(--leaf-dark));
            border-radius: 3px;
            transition: height 0.8s ease;
            position: relative;
        }

        .stem::before {
            content: '';
            position: absolute;
            left: -3px;
            top: 0;
            width: 12px;
            height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
        }

        .leaves {
            position: absolute;
            width: 100%;
            top: 20%;
        }

        .leaf {
            position: absolute;
            width: 30px;
            height: 15px;
            background: linear-gradient(135deg, var(--leaf-mid), var(--leaf-light));
            border-radius: 0 70% 0 70%;
            transform-origin: left center;
            transition: all 0.5s ease;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1);
        }

        .leaf::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 50%;
            width: 60%;
            height: 2px;
            background: var(--leaf-dark);
            transform: translateY(-50%);
        }

        .leaf.left {
            left: -25px;
            transform: rotate(-30deg);
        }

        .leaf.right {
            right: -25px;
            transform: rotate(30deg) scaleX(-1);
        }

        .leaf.left2 {
            left: -20px;
            top: 40px;
            transform: rotate(-45deg) scale(0.8);
        }

        .leaf.right2 {
            right: -20px;
            top: 40px;
            transform: rotate(45deg) scaleX(-0.8);
        }

        .flower {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .flower.bloomed {
            transform: translateX(-50%) scale(1);
        }

        .flower-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, var(--leaf-gold), #8b7355);
            border-radius: 50%;
            z-index: 2;
        }

        .petals {
            position: relative;
            width: 50px;
            height: 50px;
        }

        .petal {
            position: absolute;
            width: 20px;
            height: 30px;
            border-radius: 50% 50% 50% 50%;
            transform-origin: bottom center;
            animation: petalSway 3s ease-in-out infinite;
        }

        @keyframes petalSway {
            0%, 100% { transform: rotate(var(--base-rotation)) scale(1); }
            50% { transform: rotate(calc(var(--base-rotation) + 5deg)) scale(1.05); }
        }

        .plant-container:hover .petal {
            animation-duration: 1s;
        }

        .plant-name {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 0.85rem;
            font-style: italic;
            color: var(--leaf-gold);
            opacity: 0;
            transition: opacity 0.3s ease;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .plant-container:hover .plant-name {
            opacity: 1;
        }

        .plant-level {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--leaf-light);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .plant-container:hover .plant-level {
            opacity: 1;
        }

        .pot {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 35px;
            background: linear-gradient(180deg, #8b5a2b, #5c3d1e);
            border-radius: 5px 5px 15px 15px;
            box-shadow: 
                inset 0 -5px 10px rgba(0,0,0,0.3),
                0 5px 15px rgba(0,0,0,0.5);
        }

        .pot::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -3px;
            width: 56px;
            height: 10px;
            background: #a0522d;
            border-radius: 3px;
        }

        .soil {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px;
            height: 8px;
            background: #3d2817;
            border-radius: 50%;
        }

        .info-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: linear-gradient(145deg, var(--earth-mid), var(--earth-dark));
            border: 2px solid var(--leaf-mid);
            border-radius: 20px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            z-index: 100;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .info-panel.visible {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .info-panel::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 20px;
            background: linear-gradient(145deg, var(--leaf-mid), transparent);
            z-index: -1;
            opacity: 0.3;
        }

        .info-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            color: var(--leaf-gold);
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .info-close:hover {
            color: var(--flower-pink);
        }

        .info-title {
            font-size: 1.8rem;
            font-style: italic;
            color: var(--leaf-gold);
            margin-bottom: 0.5rem;
        }

        .info-subtitle {
            font-size: 0.9rem;
            color: var(--leaf-light);
            margin-bottom: 1rem;
        }

        .info-desc {
            font-family: 'Libre Baskerville', serif;
            font-size: 1rem;
            line-height: 1.6;
            color: #b8b4a9;
            font-style: italic;
            margin-bottom: 1.5rem;
        }

        .info-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .info-stat {
            text-align: center;
        }

        .info-stat-value {
            font-size: 2rem;
            color: var(--leaf-light);
        }

        .info-stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #6a6557;
        }

        .water-drop {
            position: absolute;
            width: 8px;
            height: 12px;
            background: var(--water);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0;
            pointer-events: none;
        }

        .water-drop.animating {
            animation: waterFall 1s ease-in forwards;
        }

        @keyframes waterFall {
            0% {
                opacity: 0.8;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(150px);
            }
        }

        .sun {
            position: fixed;
            top: 30px;
            right: 80px;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(255,220,150,0.8), rgba(255,200,100,0.3));
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255,200,100,0.5);
            animation: sunPulse 4s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes sunPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .clouds {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 200px;
            z-index: 0;
            opacity: 0.3;
        }

        .cloud {
            position: absolute;
            background: #4a5a4a;
            border-radius: 50px;
            animation: cloudFloat 20s linear infinite;
        }

        @keyframes cloudFloat {
            from { transform: translateX(-200px); }
            to { transform: translateX(calc(100vw + 200px)); }
        }

        @media (max-width: 768px) {
            .garden {
                gap: 1.5rem;
            }
            
            .plant-container {
                width: 100px;
                height: 150px;
            }
            
            .header h1 {
                letter-spacing: 0.1em;
            }
        }
    </style>
</head>
<body>
    <div class="garden-bg"></div>
    <div class="clouds" id="clouds"></div>
    <div class="sun"></div>
    <div class="ground"></div>
    <div class="fireflies" id="fireflies"></div>

    <div class="container">
        <header class="header">
            <h1>~ Jardín Digital ~</h1>
            <p>Cultiva tus habilidades, haz florecer tu potencial</p>
        </header>

        <div class="garden-stats">
            <div class="garden-stat">
                <div class="garden-stat-value" id="totalPlants">0</div>
                <div class="garden-stat-label">Plantas</div>
            </div>
            <div class="garden-stat">
                <div class="garden-stat-value" id="avgGrowth">0</div>
                <div class="garden-stat-label">Crecimiento</div>
            </div>
            <div class="garden-stat">
                <div class="garden-stat-value" id="bloomedCount">0</div>
                <div class="garden-stat-label">Florecidas</div>
            </div>
        </div>

        <div class="garden" id="garden"></div>
    </div>

    <div class="info-panel" id="infoPanel">
        <span class="info-close" id="infoClose">×</span>
        <h2 class="info-title" id="infoTitle">Skill</h2>
        <p class="info-subtitle" id="infoSubtitle">Nivel</p>
        <p class="info-desc" id="infoDesc">Descripcion</p>
        <div class="info-stats">
            <div class="info-stat">
                <div class="info-stat-value" id="infoLevel">0</div>
                <div class="info-stat-label">Nivel</div>
            </div>
            <div class="info-stat">
                <div class="info-stat-value" id="infoXP">0</div>
                <div class="info-stat-label">XP</div>
            </div>
        </div>
    </div>

    <script>
        const skills = [
            { id: 1, name: "JavaScript", icon: "⚡", level: 85, xp: 8500, flower: "orange", description: "Un rayo brillante que ilumina el jardin. Dinamico y lleno de energia renovadora." },
            { id: 2, name: "React", icon: "⚛️", level: 78, xp: 7800, flower: "blue", description: "Una flor cristalina con petalos que reflejan la luz del sol." },
            { id: 3, name: "Python", icon: "🐍", level: 72, xp: 7200, flower: "purple", description: "Una enredadera elegante que se extiende hacia nuevos conocimientos." },
            { id: 4, name: "CSS/HTML", icon: "🎨", level: 92, xp: 9200, flower: "pink", description: "La flor mas radiante del jardin, un bouquet de colores vibrantes." },
            { id: 5, name: "Node.js", icon: "🟢", level: 68, xp: 6800, flower: "green", description: "Un tallo robusto que sostiene otras plantas en el ecosistema." },
            { id: 6, name: "Databases", icon: "🗄️", level: 65, xp: 6500, flower: "purple", description: "Las raices profundas que nutren todo el jardin." },
            { id: 7, name: "Git", icon: "🔀", level: 88, xp: 8800, flower: "orange", description: "Un arbusto resistente que ha sobrevivido muchas estaciones." },
            { id: 8, name: "UX/UI", icon: "🎯", level: 70, xp: 7000, flower: "pink", description: "Una orquidea rara, unica y hermosa en su diseño." }
        ];

        const flowerColors = {
            pink: { main: '#d4a5a5', light: '#e8c4c4', dark: '#b88585' },
            purple: { main: '#9b7bb8', light: '#c4a8d4', dark: '#7a5a97' },
            orange: { main: '#d4a574', light: '#e8c9a0', dark: '#b88453' },
            blue: { main: '#7eb8c9', light: '#a8d4e0', dark: '#5a97a8' },
            green: { main: '#4a8a4a', light: '#6aaa6a', dark: '#2d5a2d' }
        };

        function createFireflies() {
            const container = document.getElementById('fireflies');
            for (let i = 0; i < 15; i++) {
                const firefly = document.createElement('div');
                firefly.className = 'firefly';
                firefly.style.left = Math.random() * 100 + '%';
                firefly.style.top = Math.random() * 60 + '%';
                firefly.style.setProperty('--duration', (3 + Math.random() * 4) + 's');
                firefly.style.setProperty('--delay', (Math.random() * 5) + 's');
                firefly.style.setProperty('--tx1', (Math.random() * 50 - 25) + 'px');
                firefly.style.setProperty('--ty1', (Math.random() * 50 - 50) + 'px');
                firefly.style.setProperty('--tx2', (Math.random() * 50 - 25) + 'px');
                firefly.style.setProperty('--ty2', (Math.random() * 50 - 25) + 'px');
                firefly.style.setProperty('--tx3', (Math.random() * 50 - 25) + 'px');
                firefly.style.setProperty('--ty3', (Math.random() * 50) + 'px');
                container.appendChild(firefly);
            }
        }

        function createClouds() {
            const container = document.getElementById('clouds');
            for (let i = 0; i < 3; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud';
                cloud.style.top = (20 + Math.random() * 40) + 'px';
                cloud.style.left = (i * 40 - 20) + '%';
                cloud.style.width = (80 + Math.random() * 60) + 'px';
                cloud.style.height = (25 + Math.random() * 15) + 'px';
                cloud.style.animationDelay = (i * 5) + 's';
                cloud.style.animationDuration = (25 + Math.random() * 10) + 's';
                container.appendChild(cloud);
            }
        }

        function createFlower(skill) {
            const colors = flowerColors[skill.flower] || flowerColors.pink;
            const bloomLevel = 60;
            const isBloomed = skill.level >= bloomLevel;
            
            const petalCount = 6;
            let petalsHTML = '';
            for (let i = 0; i < petalCount; i++) {
                const rotation = (360 / petalCount) * i;
                petalsHTML += '<div class="petal" style="\
                    background: linear-gradient(135deg, ' + colors.light + ', ' + colors.main + ');\
                    left: 50%;\
                    top: 50%;\
                    transform: translate(-50%, -100%) rotate(' + rotation + 'deg) translateY(-8px);\
                    --base-rotation: ' + rotation + 'deg;\
                "></div>';
            }

            return {
                id: skill.id,
                name: skill.name,
                level: skill.level,
                xp: skill.xp,
                icon: skill.icon,
                flower: skill.flower,
                description: skill.description,
                stemHeight: 40 + (skill.level / 100) * 80,
                isBloomed: isBloomed,
                petals: petalsHTML,
                colors: colors
            };
        }

        function renderGarden() {
            const garden = document.getElementById('garden');
            garden.innerHTML = '';
            
            skills.forEach(function(skill, index) {
                const plant = createFlower(skill);
                
                const container = document.createElement('div');
                container.className = 'plant-container';
                container.style.animationDelay = (index * 0.2) + 's';
                container.setAttribute('data-id', plant.id);
                
                container.innerHTML = 
                    '<div class="plant">' +
                        '<div class="flower ' + (plant.isBloomed ? 'bloomed' : '') + '">' +
                            '<div class="petals">' + plant.petals + '</div>' +
                            '<div class="flower-center"></div>' +
                        '</div>' +
                        '<div class="leaves">' +
                            '<div class="leaf left"></div>' +
                            '<div class="leaf right"></div>' +
                            '<div class="leaf left2"></div>' +
                            '<div class="leaf right2"></div>' +
                        '</div>' +
                        '<div class="stem" style="height: ' + plant.stemHeight + 'px"></div>' +
                        '<div class="soil"></div>' +
                        '<div class="pot"></div>' +
                    '</div>' +
                    '<span class="plant-name">' + plant.name + '</span>' +
                    '<span class="plant-level">Nivel ' + plant.level + '</span>';
                
                container.addEventListener('click', function() {
                    showInfo(plant);
                });
                
                container.addEventListener('mouseenter', function() {
                    animateWater(container);
                });
                
                garden.appendChild(container);
                
                setTimeout(function() {
                    container.style.opacity = '1';
                    container.style.transform = 'translateY(0)';
                }, index * 200);
            });
        }

        function animateWater(container) {
            const drop = document.createElement('div');
            drop.className = 'water-drop';
            drop.style.left = '50%';
            drop.style.top = '-10px';
            container.appendChild(drop);
            
            setTimeout(function() {
                drop.classList.add('animating');
            }, 10);
            
            setTimeout(function() {
                drop.remove();
            }, 1000);
        }

        function showInfo(plant) {
            document.getElementById('infoTitle').textContent = plant.name;
            document.getElementById('infoTitle').style.color = plant.colors.main;
            document.getElementById('infoSubtitle').textContent = plant.isBloomed ? '✿ Florecida ✿' : 'En crecimiento';
            document.getElementById('infoDesc').textContent = plant.description;
            document.getElementById('infoLevel').textContent = plant.level;
            document.getElementById('infoXP').textContent = plant.xp.toLocaleString();
            
            document.getElementById('infoPanel').classList.add('visible');
        }

        function hideInfo() {
            document.getElementById('infoPanel').classList.remove('visible');
        }

        document.getElementById('infoClose').addEventListener('click', hideInfo);
        
        document.getElementById('infoPanel').addEventListener('click', function(e) {
            if (e.target === this) hideInfo();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') hideInfo();
        });

        function updateStats() {
            const totalPlants = skills.length;
            const avgGrowth = Math.round(skills.reduce(function(acc, s) { return acc + s.level; }, 0) / totalPlants);
            const bloomedCount = skills.filter(function(s) { return s.level >= 60; }).length;
            
            document.getElementById('totalPlants').textContent = totalPlants;
            document.getElementById('avgGrowth').textContent = avgGrowth + '%';
            document.getElementById('bloomedCount').textContent = bloomedCount;
        }

        createFireflies();
        createClouds();
        renderGarden();
        updateStats();
    </script>
</body>
</html>
