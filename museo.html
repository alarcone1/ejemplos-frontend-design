<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPOSICIÓN MUSEO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-wall: #121212;
            --text-light: #f5f5f0;
            --text-muted: #8a8a85;
            --accent-gold: #c9a962;
            --shadow-dark: rgba(0, 0, 0, 0.8);
            --spotlight: rgba(255, 250, 240, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: var(--text-light);
            overflow-x: hidden;
        }

        .museum {
            min-height: 100vh;
            padding: 60px 40px;
        }

        .header {
            text-align: center;
            padding: 80px 0 120px;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
        }

        .museum-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--text-light), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .museum-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 300;
            font-style: italic;
            color: var(--text-muted);
            letter-spacing: 0.2em;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 200px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .artwork {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 80px;
            align-items: center;
            opacity: 0;
            transform: translateY(60px);
            transition: all 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .artwork.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .artwork:nth-child(even) {
            grid-template-columns: 1.5fr 1fr;
        }

        .artwork:nth-child(even) .artwork-info {
            order: -1;
        }

        .artwork-frame {
            position: relative;
            aspect-ratio: 4/5;
            background: #0d0d0d;
            box-shadow: 
                0 30px 60px var(--shadow-dark),
                0 10px 20px var(--shadow-dark);
            overflow: hidden;
        }

        .artwork-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 50% 30%, var(--spotlight) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.8s ease;
            z-index: 2;
        }

        .artwork:hover .artwork-frame::before {
            opacity: 1;
        }

        .artwork-canvas {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .artwork-icon {
            font-size: 8rem;
            opacity: 0.9;
            transition: all 0.6s ease;
            filter: grayscale(30%);
        }

        .artwork:hover .artwork-icon {
            transform: scale(1.05);
            filter: grayscale(0%);
        }

        .artwork-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.1;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 10px, currentColor 10px, currentColor 11px),
                repeating-linear-gradient(-45deg, transparent, transparent 10px, currentColor 10px, currentColor 11px);
        }

        .artwork-number {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 300;
            color: var(--accent-gold);
            opacity: 0.5;
        }

        .artwork-info {
            padding: 20px 0;
        }

        .artwork-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
            color: var(--text-light);
        }

        .artwork-medium {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--accent-gold);
            margin-bottom: 2rem;
        }

        .artwork-description {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-style: italic;
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .artwork-stats {
            display: flex;
            gap: 40px;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(201, 169, 98, 0.2);
        }

        .artwork-stat {
            text-align: center;
        }

        .artwork-stat-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--text-light);
        }

        .artwork-stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .level-indicator {
            position: fixed;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
        }

        .level-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .level-dot::before {
            content: attr(data-name);
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .level-dot:hover::before {
            opacity: 1;
        }

        .level-dot.active {
            background: var(--accent-gold);
            box-shadow: 0 0 10px var(--accent-gold);
        }

        .floor {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 15%;
            background: linear-gradient(180deg, transparent, rgba(18, 18, 18, 0.5));
            pointer-events: none;
        }

        .spotlight {
            position: fixed;
            width: 300px;
            height: 600px;
            background: radial-gradient(ellipse at top, var(--spotlight), transparent 70%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease;
            z-index: 1;
        }

        .spotlight.left {
            top: 0;
            left: 0;
        }

        .spotlight.right {
            top: 0;
            right: 0;
        }

        .nav-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 100;
        }

        .nav-item {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent-gold);
            transition: width 0.3s ease;
        }

        .nav-item:hover {
            color: var(--text-light);
        }

        .nav-item:hover::after {
            width: 100%;
        }

        .exhibition-info {
            position: fixed;
            top: 40px;
            left: 40px;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
        }

        @media (max-width: 900px) {
            .artwork {
                grid-template-columns: 1fr !important;
                gap: 40px;
            }
            
            .artwork:nth-child(even) .artwork-info {
                order: 0;
            }
            
            .artwork-frame {
                max-width: 400px;
                margin: 0 auto;
            }
            
            .level-indicator {
                display: none;
            }
            
            .museum {
                padding: 40px 20px;
            }
            
            .gallery {
                gap: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="spotlight left" id="spotlightLeft"></div>
    <div class="spotlight right" id="spotlightRight"></div>
    <div class="floor"></div>

    <div class="exhibition-info">
        Exposición Permanente — 2026
    </div>

    <div class="museum">
        <header class="header">
            <h1 class="museum-title">Galería</h1>
            <p class="museum-subtitle">Colección de Habilidades</p>
        </header>

        <div class="gallery" id="gallery"></div>
    </div>

    <div class="level-indicator" id="levelIndicator"></div>

    <div class="nav-indicator">
        <span class="nav-item" onclick="scrollToArtwork(0)">Inicio</span>
        <span class="nav-item" onclick="scrollToArtwork(4)">Obras</span>
        <span class="nav-item" onclick="scrollToArtwork(7)">Fin</span>
    </div>

    <script>
        const skills = [
            { 
                id: 1, 
                name: "JavaScript", 
                icon: "⚡", 
                level: 85, 
                xp: 8500, 
                color: "#d4a574",
                description: "Una obra que captura la esencia del movimiento y la transformación. Como la electricidad que atraviesa un circuito, este lenguaje da vida a la staticidad del código."
            },
            { 
                id: 2, 
                name: "React", 
                icon: "⚛️", 
                level: 78, 
                xp: 7800, 
                color: "#7eb8c9",
                description: "Composición atómica del interfaz moderno. Cada componente es una entidad independiente que, en harmony, construye complejidad desde la simplicidad."
            },
            { 
                id: 3, 
                name: "Python", 
                icon: "🐍", 
                level: 72, 
                xp: 7200, 
                color: "#9b7bb8",
                description: "La serpiente pitón que envuelve el mundo digital. Versatilidad extrema ocultada bajo una superficie de elegancia minimalista."
            },
            { 
                id: 4, 
                name: "CSS/HTML", 
                icon: "🎨", 
                level: 92, 
                xp: 9200, 
                color: "#d4a5a5",
                description: "El matrimonio perfecto entre estructura y expresión. Donde la arquitectura encuentra su rostro y la interfaz revela su alma."
            },
            { 
                id: 5, 
                name: "Node.js", 
                icon: "🟢", 
                level: 68, 
                xp: 6800, 
                color: "#6a9a6a",
                description: "El puente entre mundos. JavaScript trascendiendo sus límites para crear ecosistemas server-side de remarkable complejidad."
            },
            { 
                id: 6, 
                name: "Databases", 
                icon: "🗄️", 
                level: 65, 
                xp: 6500, 
                color: "#a89070",
                description: "Arquivos del tiempo. Memorias cristalizadas que preservan el conocimiento a través de las eras digitales."
            },
            { 
                id: 7, 
                name: "Git", 
                icon: "🔀", 
                level: 88, 
                xp: 8800, 
                color: "#c4a35a",
                description: "El guardián del tiempo. Permite navegar entre realidades alternativas del código, creando un tapiz de versiones."
            },
            { 
                id: 8, 
                name: "UX/UI", 
                icon: "🎯", 
                level: 70, 
                xp: 7000, 
                color: "#b88a9b",
                description: "La intersección entre lo funcional y lo emocional. Donde la tecnología encuentra su conexión más profunda con lo humano."
            }
        ];

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            skills.forEach(function(skill, index) {
                const artwork = document.createElement('div');
                artwork.className = 'artwork';
                artwork.id = 'artwork-' + index;
                
                artwork.innerHTML = 
                    '<div class="artwork-frame">' +
                        '<span class="artwork-number">0' + (index + 1) + '</span>' +
                        '<div class="artwork-canvas">' +
                            '<div class="artwork-pattern" style="color: ' + skill.color + '"></div>' +
                            '<span class="artwork-icon" style="color: ' + skill.color + '">' + skill.icon + '</span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="artwork-info">' +
                        '<h2 class="artwork-title">' + skill.name + '</h2>' +
                        '<p class="artwork-medium">Dominio: ' + skill.level + '%</p>' +
                        '<p class="artwork-description">' + skill.description + '</p>' +
                        '<div class="artwork-stats">' +
                            '<div class="artwork-stat">' +
                                '<div class="artwork-stat-value">' + skill.level + '</div>' +
                                '<div class="artwork-stat-label">Nivel</div>' +
                            '</div>' +
                            '<div class="artwork-stat">' +
                                '<div class="artwork-stat-value">' + (skill.xp / 1000).toFixed(1) + 'K</div>' +
                                '<div class="artwork-stat-label">XP</div>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                
                gallery.appendChild(artwork);
            });
        }

        function renderLevelIndicator() {
            const indicator = document.getElementById('levelIndicator');
            indicator.innerHTML = '';
            
            skills.forEach(function(skill, index) {
                const dot = document.createElement('div');
                dot.className = 'level-dot';
                dot.setAttribute('data-name', skill.name);
                dot.addEventListener('click', function() {
                    scrollToArtwork(index);
                });
                indicator.appendChild(dot);
            });
        }

        function scrollToArtwork(index) {
            const artwork = document.getElementById('artwork-' + index);
            if (artwork) {
                artwork.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function updateSpotlights() {
            const spotlights = document.querySelectorAll('.artwork');
            const windowHeight = window.innerHeight;
            
            spotlights.forEach(function(artwork, index) {
                const rect = artwork.getBoundingClientRect();
                const isVisible = rect.top < windowHeight * 0.7 && rect.bottom > windowHeight * 0.3;
                
                if (isVisible) {
                    const leftSpot = document.getElementById('spotlightLeft');
                    const rightSpot = document.getElementById('spotlightRight');
                    leftSpot.style.opacity = '1';
                    rightSpot.style.opacity = '1';
                    
                    leftSpot.style.transform = 'translateX(' + (index * 20) + 'px)';
                    rightSpot.style.transform = 'translateX(-' + (index * 20) + 'px)';
                }
            });
        }

        function handleScroll() {
            const artworks = document.querySelectorAll('.artwork');
            const dots = document.querySelectorAll('.level-dot');
            
            artworks.forEach(function(artwork, index) {
                const rect = artwork.getBoundingClientRect();
                const isVisible = rect.top < window.innerHeight * 0.7 && rect.bottom > window.innerHeight * 0.3;
                
                if (isVisible) {
                    artwork.classList.add('visible');
                    dots[index].classList.add('active');
                } else {
                    dots[index].classList.remove('active');
                }
            });
        }

        renderGallery();
        renderLevelIndicator();
        
        window.addEventListener('scroll', handleScroll);
        window.addEventListener('scroll', updateSpotlights);
        
        handleScroll();
    </script>
</body>
</html>
